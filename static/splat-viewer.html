<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { margin:0; padding:0; }
html,body { width:100%; height:100%; background:#0f172a; overflow:hidden; font-family:sans-serif; }
#canvas { display:block; position:absolute; top:0; left:0; width:100%; height:100%; touch-action:none; }
.scene, #message { position:absolute; display:flex; top:0; right:0; left:0; bottom:0; z-index:2;
  height:100%; width:100%; align-items:center; justify-content:center; }
#message { font-weight:bold; font-size:large; color:#f87171; pointer-events:none; }
#progress { position:absolute; top:0; height:4px; background:#6366f1; z-index:99; transition:width .1s ease-in-out; }
.cube-wrapper { transform-style:preserve-3d; }
.cube { transform-style:preserve-3d; transform:rotateX(45deg) rotateZ(45deg); animation:rotation 2s infinite; }
.cube-faces { transform-style:preserve-3d; height:60px; width:60px; position:relative;
  transform-origin:0 0; transform:translateX(0) translateY(0) translateZ(-30px); }
.cube-face { position:absolute; inset:0; background:#6366f1; border:solid 1px #ffffff; }
.cube-face.top  { transform:translateZ(60px); }
.cube-face.front{ transform-origin:0 50%; transform:rotateY(-90deg); }
.cube-face.back { transform-origin:0 50%; transform:rotateY(-90deg) translateZ(-60px); }
.cube-face.right{ transform-origin:50% 0; transform:rotateX(-90deg) translateY(-60px); }
.cube-face.left { transform-origin:50% 0; transform:rotateX(-90deg) translateY(-60px) translateZ(60px); }
@keyframes rotation {
  0%   { transform:rotateX(45deg) rotateY(0) rotateZ(45deg); animation-timing-function:cubic-bezier(.17,.84,.44,1); }
  50%  { transform:rotateX(45deg) rotateY(0) rotateZ(225deg); animation-timing-function:cubic-bezier(.76,.05,.86,.06); }
  100% { transform:rotateX(45deg) rotateY(0) rotateZ(405deg); animation-timing-function:cubic-bezier(.17,.84,.44,1); }
}
</style>
</head>
<body>
<div id="progress"></div>
<div id="message"></div>
<div class="scene" id="spinner">
  <div class="cube-wrapper"><div class="cube"><div class="cube-faces">
    <div class="cube-face bottom"></div><div class="cube-face top"></div>
    <div class="cube-face left"></div><div class="cube-face right"></div>
    <div class="cube-face back"></div><div class="cube-face front"></div>
  </div></div></div>
</div>
<canvas id="canvas"></canvas>
<script>
// ── Matrix helpers (verbatim from antimatter15/splat) ─────────────────────────

// ── Worker (verbatim from antimatter15/splat) ─────────────────────────────────
function createWorker(self){

    var _int32View=new Int32Array(_floatView.buffer);
    function floatToHalf(float){_floatView[0]=float;var f=_int32View[0];var sign=(f>>31)&0x0001;var exp=(f>>23)&0x00ff;var frac=f&0x007fffff;var newExp;if(exp==0){newExp=0;}else if(exp<113){newExp=0;frac|=0x00800000;frac=frac>>(113-exp);if(frac&0x01000000){newExp=1;frac=0;}}else if(exp<142){newExp=exp-112;}else{newExp=31;frac=0;}return(sign<<15)|(newExp<<10)|(frac>>13);}
    function packHalf2x16(x,y){return(floatToHalf(x)|(floatToHalf(y)<<16))>>>0;}
    function generateTexture(){if(!buffer)return;const f_buffer=new Float32Array(buffer);const u_buffer=new Uint8Array(buffer);var texwidth=1024*2;var texheight=Math.ceil((2*vertexCount)/texwidth);var texdata=new Uint32Array(texwidth*texheight*4);var texdata_c=new Uint8Array(texdata.buffer);var texdata_f=new Float32Array(texdata.buffer);for(let i=0;i<vertexCount;i++){texdata_f[8*i+0]=f_buffer[8*i+0];texdata_f[8*i+1]=f_buffer[8*i+1];texdata_f[8*i+2]=f_buffer[8*i+2];texdata_c[4*(8*i+7)+0]=u_buffer[32*i+24+0];texdata_c[4*(8*i+7)+1]=u_buffer[32*i+24+1];texdata_c[4*(8*i+7)+2]=u_buffer[32*i+24+2];texdata_c[4*(8*i+7)+3]=u_buffer[32*i+24+3];let scale=[f_buffer[8*i+3+0],f_buffer[8*i+3+1],f_buffer[8*i+3+2]];let rot=[(u_buffer[32*i+28+0]-128)/128,(u_buffer[32*i+28+1]-128)/128,(u_buffer[32*i+28+2]-128)/128,(u_buffer[32*i+28+3]-128)/128];const M=[1.0-2.0*(rot[2]*rot[2]+rot[3]*rot[3]),2.0*(rot[1]*rot[2]+rot[0]*rot[3]),2.0*(rot[1]*rot[3]-rot[0]*rot[2]),2.0*(rot[1]*rot[2]-rot[0]*rot[3]),1.0-2.0*(rot[1]*rot[1]+rot[3]*rot[3]),2.0*(rot[2]*rot[3]+rot[0]*rot[1]),2.0*(rot[1]*rot[3]+rot[0]*rot[2]),2.0*(rot[2]*rot[3]-rot[0]*rot[1]),1.0-2.0*(rot[1]*rot[1]+rot[2]*rot[2])].map((k,i)=>k*scale[Math.floor(i/3)]);const sigma=[M[0]*M[0]+M[3]*M[3]+M[6]*M[6],M[0]*M[1]+M[3]*M[4]+M[6]*M[7],M[0]*M[2]+M[3]*M[5]+M[6]*M[8],M[1]*M[1]+M[4]*M[4]+M[7]*M[7],M[1]*M[2]+M[4]*M[5]+M[7]*M[8],M[2]*M[2]+M[5]*M[5]+M[8]*M[8]];texdata[8*i+4]=packHalf2x16(4*sigma[0],4*sigma[1]);texdata[8*i+5]=packHalf2x16(4*sigma[2],4*sigma[3]);texdata[8*i+6]=packHalf2x16(4*sigma[4],4*sigma[5]);}self.postMessage({texdata,texwidth,texheight},[texdata.buffer]);}
    function runSort(viewProj){if(!buffer)return;const f_buffer=new Float32Array(buffer);if(lastVertexCount==vertexCount){let dot=lastProj[2]*viewProj[2]+lastProj[6]*viewProj[6]+lastProj[10]*viewProj[10];if(Math.abs(dot-1)<0.01)return;}else{generateTexture();lastVertexCount=vertexCount;}let maxDepth=-Infinity,minDepth=Infinity,sizeList=new Int32Array(vertexCount);for(let i=0;i<vertexCount;i++){let depth=((viewProj[2]*f_buffer[8*i+0]+viewProj[6]*f_buffer[8*i+1]+viewProj[10]*f_buffer[8*i+2])*4096)|0;sizeList[i]=depth;if(depth>maxDepth)maxDepth=depth;if(depth<minDepth)minDepth=depth;}let depthInv=(256*256-1)/(maxDepth-minDepth);let counts0=new Uint32Array(256*256);for(let i=0;i<vertexCount;i++){sizeList[i]=((sizeList[i]-minDepth)*depthInv)|0;counts0[sizeList[i]]++;}let starts0=new Uint32Array(256*256);for(let i=1;i<256*256;i++)starts0[i]=starts0[i-1]+counts0[i-1];depthIndex=new Uint32Array(vertexCount);for(let i=0;i<vertexCount;i++)depthIndex[starts0[sizeList[i]]++]=i;lastProj=viewProj;self.postMessage({depthIndex,viewProj,vertexCount},[depthIndex.buffer]);}
    function processPlyBuffer(inputBuffer){const ubuf=new Uint8Array(inputBuffer);const header=new TextDecoder().decode(ubuf.slice(0,1024*10));const header_end="end_header\n";const header_end_index=header.indexOf(header_end);if(header_end_index<0)throw new Error("Unable to read .ply file header");const vertexCount=parseInt(/element vertex (\d+)\n/.exec(header)[1]);let row_offset=0,offsets={},types={};const TYPE_MAP={double:"getFloat64",int:"getInt32",uint:"getUint32",float:"getFloat32",short:"getInt16",ushort:"getUint16",uchar:"getUint8"};for(let prop of header.slice(0,header_end_index).split("\n").filter((k)=>k.startsWith("property "))){const[p,type,name]=prop.split(" ");const arrayType=TYPE_MAP[type]||"getInt8";types[name]=arrayType;offsets[name]=row_offset;row_offset+=parseInt(arrayType.replace(/[^\d]/g,""))/8;}let dataView=new DataView(inputBuffer,header_end_index+header_end.length);let row=0;const attrs=new Proxy({},{get(target,prop){if(!types[prop])throw new Error(prop+" not found");return dataView[types[prop]](row*row_offset+offsets[prop],true);}});let sizeList=new Float32Array(vertexCount),sizeIndex=new Uint32Array(vertexCount);for(row=0;row<vertexCount;row++){sizeIndex[row]=row;if(!types["scale_0"])continue;const size=Math.exp(attrs.scale_0)*Math.exp(attrs.scale_1)*Math.exp(attrs.scale_2);const opacity=1/(1+Math.exp(-attrs.opacity));sizeList[row]=size*opacity;}sizeIndex.sort((b,a)=>sizeList[a]-sizeList[b]);const rowLength=3*4+3*4+4+4;const buffer=new ArrayBuffer(rowLength*vertexCount);for(let j=0;j<vertexCount;j++){row=sizeIndex[j];const position=new Float32Array(buffer,j*rowLength,3);const scales=new Float32Array(buffer,j*rowLength+4*3,3);const rgba=new Uint8ClampedArray(buffer,j*rowLength+4*3+4*3,4);const rot=new Uint8ClampedArray(buffer,j*rowLength+4*3+4*3+4,4);if(types["scale_0"]){const qlen=Math.sqrt(attrs.rot_0**2+attrs.rot_1**2+attrs.rot_2**2+attrs.rot_3**2);rot[0]=(attrs.rot_0/qlen)*128+128;rot[1]=(attrs.rot_1/qlen)*128+128;rot[2]=(attrs.rot_2/qlen) // ── Shaders (verbatim from antimatter15/splat) ────────────────────────────────
const vertexShaderSource = `#version 300 es
precision highp float; precision highp int;
uniform highp usampler2D u_texture;
uniform mat4 projection, view;
uniform vec2 focal, viewport;
in vec2 position; in int index;
out vec4 vColor; out vec2 vPosition;
void main(){
    uvec4 cen=texelFetch(u_texture,ivec2((uint(index)&0x3ffu)<<1,uint(index)>>10),0);
    vec4 cam=view*vec4(uintBitsToFloat(cen.xyz),1);
    vec4 pos2d=projection*cam;
    float clip=1.2*pos2d.w;
    if(pos2d.z<-clip||pos2d.x<-clip||pos2d.x>clip||pos2d.y<-clip||pos2d.y>clip){gl_Position=vec4(0,0,2,1);return;}
    uvec4 cov=texelFetch(u_texture,ivec2(((uint(index)&0x3ffu)<<1)|1u,uint(index)>>10),0);
    vec2 u1=unpackHalf2x16(cov.x),u2=unpackHalf2x16(cov.y),u3=unpackHalf2x16(cov.z);
    mat3 Vrk=mat3(u1.x,u1.y,u2.x,u1.y,u2.y,u3.x,u2.x,u3.x,u3.y);
    mat3 J=mat3(focal.x/cam.z,0.,-(focal.x*cam.x)/(cam.z*cam.z),0.,-focal.y/cam.z,(focal.y*cam.y)/(cam.z*cam.z),0.,0.,0.);
    mat3 T=transpose(mat3(view))*J;
    mat3 cov2d=transpose(T)*Vrk*T;
    float mid=(cov2d[0][0]+cov2d[1][1])/2.0;
    float radius=length(vec2((cov2d[0][0]-cov2d[1][1])/2.0,cov2d[0][1]));
    float lambda1=mid+radius,lambda2=mid-radius;
    if(lambda2<0.0)return;
    vec2 diagonalVector=normalize(vec2(cov2d[0][1],lambda1-cov2d[0][0]));
    vec2 majorAxis=min(sqrt(2.0*lambda1),1024.0)*diagonalVector;
    vec2 minorAxis=min(sqrt(2.0*lambda2),1024.0)*vec2(diagonalVector.y,-diagonalVector.x);
    vColor=clamp(pos2d.z/pos2d.w+1.0,0.0,1.0)*vec4((cov.w)&0xffu,(cov.w>>8)&0xffu,(cov.w>>16)&0xffu,(cov.w>>24)&0xffu)/255.0;

    vec2 vCenter=vec2(pos2d)/pos2d.w;
    gl_Position=vec4(vCenter+position.x*majorAxis/viewport+position.y*minorAxis/viewport,0,1);
}`.trim();

const fragmentShaderSource = `#version 300 es
precision highp float;
in vec4 vColor; in vec2 vPosition; out vec4 fragColor;
void main(){
    float A=-dot(vPosition,vPosition);
    if(A<-4.0)discard;
    float B=exp(A)*vColor.a;
    fragColor=vec4(B*vColor.rgb,B);
}`.trim();

// ── Main ──────────────────────────────────────────────────────────────────────
const rowLength = 3*4 + 3*4 + 4 + 4;
let viewMatrix = [0.47,0.04,0.88,0,-0.11,0.99,0.02,0,-0.88,-0.11,0.47,0,0.07,0.03,6.55,1];

async function main() {
    const params  = new URLSearchParams(location.search);
    const plyURL  = params.get("url");

    const canvas  = document.getElementById("canvas");
    const gl      = canvas.getContext("webgl2", { antialias: false });
    if (!gl) { document.getElementById("message").innerText = "WebGL2 not supported"; return; }

    const worker = new Worker(URL.createObjectURL(
        new Blob(["(", createWorker.toString(), ")(self)"], { type: "application/javascript" })
    ));

    let splatData = new Uint8Array(0);
    let projectionMatrix;
    let vertexCount = 0;
    let stopLoading = false;

    // ── compile shaders ────────────────────────────────────────────────────
    function compileShader(src, type) {
        const s = gl.createShader(type);

            throw new Error(gl.getShaderInfoLog(s));

        throw new Error(gl.getProgramInfoLog(program));

    gl.enable(gl.BLEND);

    const u_viewport   = gl.getUniformLocation(program, "viewport");
    const u_focal      = gl.getUniformLocation(program, "focal");
    const u_view       = gl.getUniformLocation(program, "view");

    const triangleVertices = new Float32Array([-2,-2, 2,-2, 2,2, -2,2]);
    const vertexBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, triangleVertices, gl.STATIC_DRAW);
    const a_position = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(a_position);
    gl.vertexAttribPointer(a_position, 2, gl.FLOAT, false, 0, 0);

    const texture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.uniform1i(gl.getUniformLocation(program, "u_texture"), 0);

    const indexBuffer = gl.createBuffer();
    const a_index = gl.getAttribLocation(program, "index");
    gl.enableVertexAttribArray(a_index);
    gl.bindBuffer(gl.ARRAY_BUFFER, indexBuffer);
    gl.vertexAttribIPointer(a_index, 1, gl.INT, false, 0, 0);
    gl.vertexAttribDivisor(a_index, 1);

    // ── resize ─────────────────────────────────────────────────────────────
    const fx = () => innerWidth  * 1.2;
    const fy = () => innerHeight * 1.2;

    function resize() {
        projectionMatrix = getProjectionMatrix(fx(), fy(), innerWidth, innerHeight);
        gl.uniform2fv(u_focal, [fx(), fy()]);
        gl.uniform2fv(u_viewport, [innerWidth, innerHeight]);
        gl.canvas.width  = innerWidth;
        gl.canvas.height = innerHeight;
        gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
        gl.uniformMatrix4fv(u_projection, false, projectionMatrix);
    }
    window.addEventListener("resize", resize);
    resize();

    // ── worker messages ────────────────────────────────────────────────────
    worker.onmessage = (e) => {
        if (e.data.buffer) {
            splatData = new Uint8Array(e.data.buffer);
        } else if (e.data.texdata) {
            const { texdata, texwidth, texheight } = e.data;
            gl.bindTexture(gl.TEXTURE_2D, texture);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32UI, texwidth, texheight, 0,
                          gl.RGBA_INTEGER, gl.UNSIGNED_INT, texdata);
            gl.activeTexture(gl.TEXTURE0);
            gl.bindTexture(gl.TEXTURE_2D, texture);
        } else if (e.data.depthIndex) {
            gl.bindBuffer(gl.ARRAY_BUFFER, indexBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, e.data.depthIndex, gl.DYNAMIC_DRAW);
            vertexCount = e.data.vertexCount;
        }
    };

    // ── render loop ────────────────────────────────────────────────────────
    const frame = (now) => {
        let inv = invert4(viewMatrix);
        viewMatrix = invert4(inv);
        const viewProj = multiply4(projectionMatrix, viewMatrix);
        worker.postMessage({ view: viewProj });
        if (vertexCount > 0) {
            document.getElementById("spinner").style.display = "none";
            gl.uniformMatrix4fv(u_view, false, viewMatrix);
            gl.clear(gl.COLOR_BUFFER_BIT);
            gl.drawArraysInstanced(gl.TRIANGLE_FAN, 0, 4, vertexCount);
        } else {
            gl.clear(gl.COLOR_BUFFER_BIT);
        }
        const progress = splatData.length > 0 ? (100 * vertexCount) / (splatData.length / rowLength) : 0;
        const bar = document.getElementById("progress");
        bar.style.width = progress < 100 ? progress + "%" : "0";
        requestAnimationFrame(frame);
    };
    frame();

    // ── load PLY from URL ──────────────────────────────────────────────────
    const isPly = (d) => d[0]===112 && d[1]===108 && d[2]===121 && d[3]===10;

    async function loadFromURL(url) {
        const headers = {};
        if (url.includes("ngrok")) headers["ngrok-skip-browser-warning"] = "true";
        const req = await fetch(url, { headers });
        if (!req.ok) throw new Error("HTTP " + req.status + " — " + url);

        const contentLength = parseInt(req.headers.get("content-length") || "0");
        const reader = req.body.getReader();
        splatData = new Uint8Array(contentLength || 1024 * 1024 * 50);
        let bytesRead = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            if (bytesRead + value.length > splatData.length) {
                const bigger = new Uint8Array(splatData.length * 2);
                bigger.set(splatData); splatData = bigger;
            }
            splatData.set(value, bytesRead);
            bytesRead += value.length;
        }
        splatData = splatData.slice(0, bytesRead);
        if (isPly(splatData)) {
            worker.postMessage({ ply: splatData.buffer, save: false });
        } else {
            worker.postMessage({ buffer: splatData.buffer, vertexCount: Math.floor(bytesRead / rowLength) });
        }
    }

    function loadFromBuffer(buf) {
        const d = new Uint8Array(buf);
        if (isPly(d)) {
            worker.postMessage({ ply: buf, save: false });
        } else {
            worker.postMessage({ buffer: buf, vertexCount: Math.floor(buf.byteLength / rowLength) });
        }
    }

    // ── entry point ────────────────────────────────────────────────────────
    if (plyURL) {
        loadFromURL(decodeURIComponent(plyURL)).catch(err => {
            document.getElementById("spinner").style.display = "none";
            document.getElementById("message").innerText = err.toString();
        });
    } else {
        // Signal parent we are ready to receive a buffer via postMessage
        window.parent.postMessage({ type: "splatViewerReady" }, "*");
    }

    window.addEventListener("message", (e) => {
        if (!e.data) return;
        if (e.data.type === "loadBuffer" && e.data.buffer) {
            loadFromBuffer(e.data.buffer);
        } else if (e.data.type === "loadURL" && e.data.url) {
            loadFromURL(e.data.url).catch(err => {
                document.getElementById("message").innerText = err.toString();
            });
        }
    });

    // ── mouse controls ─────────────────────────────────────────────────────
    let startX, startY, down;
    canvas.addEventListener("mousedown", (e) => { e.preventDefault(); startX=e.clientX; startY=e.clientY; down=e.ctrlKey||e.metaKey?2:1; });
    canvas.addEventListener("contextmenu", (e) => { e.preventDefault(); startX=e.clientX; startY=e.clientY; down=2; });
    window.addEventListener("mouseup", () => { down=false; });
    canvas.addEventListener("mousemove", (e) => {
        e.preventDefault();
        if (down===1) {
            let inv=invert4(viewMatrix),dx=(5*(e.clientX-startX))/innerWidth,dy=(5*(e.clientY-startY))/innerHeight,d=4;
            inv=translate4(inv,0,0,d); inv=rotate4(inv,dx,0,1,0); inv=rotate4(inv,-dy,1,0,0); inv=translate4(inv,0,0,-d);
            viewMatrix=invert4(inv); startX=e.clientX; startY=e.clientY;
        } else if (down===2) {
            let inv=invert4(viewMatrix);
            inv=translate4(inv,(-10*(e.clientX-startX))/innerWidth,0,(10*(e.clientY-startY))/innerHeight);
            viewMatrix=invert4(inv); startX=e.clientX; startY=e.clientY;
        }
    });
    window.addEventListener("wheel", (e) => {
        e.preventDefault();
        const scale = e.deltaMode===1 ? 10 : e.deltaMode===2 ? innerHeight : 1;
        let inv = invert4(viewMatrix);
        if (e.shiftKey) {
            // shift + scroll → strafe
            inv = translate4(inv, (e.deltaX*scale)/innerWidth, (e.deltaY*scale)/innerHeight, 0);
        } else if (e.ctrlKey || e.metaKey) {
            // ctrl + scroll → orbit
            let d=4;
            inv=translate4(inv,0,0,d);
            inv=rotate4(inv,-(e.deltaX*scale)/innerWidth,0,1,0);
            inv=rotate4(inv,(e.deltaY*scale)/innerHeight,1,0,0);
            inv=translate4(inv,0,0,-d);
        } else {
            // plain scroll → zoom forward/back
            inv = translate4(inv, 0, 0, (-10*(e.deltaY*scale))/innerHeight);
        }
        viewMatrix = invert4(inv);
    }, { passive: false });

    // ── touch controls ─────────────────────────────────────────────────────
    let altX=0,altY=0;
    canvas.addEventListener("touchstart",(e)=>{ e.preventDefault();
        if(e.touches.length===1){startX=e.touches[0].clientX;startY=e.touches[0].clientY;down=1;}
        else if(e.touches.length===2){startX=e.touches[0].clientX;altX=e.touches[1].clientX;startY=e.touches[0].clientY;altY=e.touches[1].clientY;down=1;}
    },{passive:false});
    canvas.addEventListener("touchend",(e)=>{e.preventDefault();down=false;},{passive:false});
    canvas.addEventListener("touchmove",(e)=>{
        e.preventDefault();
        if(e.touches.length===1&&down){
            let inv=invert4(viewMatrix),dx=(4*(e.touches[0].clientX-startX))/innerWidth,dy=(4*(e.touches[0].clientY-startY))/innerHeight,d=4;
            inv=translate4(inv,0,0,d);inv=rotate4(inv,dx,0,1,0);inv=rotate4(inv,-dy,1,0,0);inv=translate4(inv,0,0,-d);
            viewMatrix=invert4(inv);startX=e.touches[0].clientX;startY=e.touches[0].clientY;
        } else if(e.touches.length===2){
            const dscale=Math.hypot(startX-altX,startY-altY)/Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
            const dtheta=Math.atan2(startY-altY,startX-altX)-Math.atan2(e.touches[0].clientY-e.touches[1].clientY,e.touches[0].clientX-e.touches[1].clientX);
            let inv=invert4(viewMatrix);inv=rotate4(inv,dtheta,0,0,1);inv=translate4(inv,0,0,3*(1-dscale));viewMatrix=invert4(inv);
            startX=e.touches[0].clientX;altX=e.touches[1].clientX;startY=e.touches[0].clientY;altY=e.touches[1].clientY;
        }
    },{passive:false});
}

main().catch((err) => {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("message").innerText = err.toString();
});
</script>
</body>
</html>
