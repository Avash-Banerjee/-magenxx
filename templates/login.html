{% extends "base.html" %}
{% block title %}FitScan — Sign In{% endblock %}

{% block content %}
<div style="max-width:440px; margin:60px auto 0;">
    <h1>FitScan</h1>
    <p class="subtitle">AI-Powered Body Analysis & Fitness Planning</p>

    <div class="card">
        <h2 style="text-align:center;">Sign In</h2>
        <div id="loginError" class="error-box" style="margin-bottom:16px;"></div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="inputEmail" placeholder="you@example.com" autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="inputPassword" placeholder="Your password">
        </div>

        <button class="btn" id="btnLogin" onclick="doLogin()">Sign In</button>

        <p style="text-align:center; margin-top:20px; color:var(--text-muted); font-size:0.88rem;">
            Don't have an account?
            <a href="/register" style="color:var(--accent-1); text-decoration:none; font-weight:600;">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function doLogin() {
    const email = document.getElementById("inputEmail").value.trim();
    const password = document.getElementById("inputPassword").value;
    const errBox = document.getElementById("loginError");
    const btn = document.getElementById("btnLogin");

    errBox.classList.remove("active");
    if (!email || !password) {
        errBox.textContent = "Please enter email and password.";
        errBox.classList.add("active");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Signing in...";

    try {
        const resp = await apiPost("/api/auth/login", { email, password });
        if (resp.error) {
            errBox.textContent = resp.error;
            errBox.classList.add("active");
        } else {
            window.location.href = resp.redirect || "/dashboard";
        }
    } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.add("active");
    } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
    }
}

document.getElementById("inputPassword").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
});
document.getElementById("inputEmail").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("inputPassword").focus();
});
</script>
{% endblock %}
